name: CodeQL (Rust)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:
permissions:
  contents: read


jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@eda5730a8bfb740e03a28087a958444c646e5842 # v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@eda5730a8bfb740e03a28087a958444c646e5842 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@eda5730a8bfb740e03a28087a958444c646e5842 # v3
        with:
          category: "/language:rust"

name: CodeQL (Rust)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8c6e48dbe051ceb3015c19554831af1b43275f46 # v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@8c6e48dbe051ceb3015c19554831af1b43275f46 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8c6e48dbe051ceb3015c19554831af1b43275f46 # v3
        with:
          category: "/language:rust"

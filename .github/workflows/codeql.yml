name: CodeQL
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8c6e48dbe051ceb3015c19554831af1b43275f46 # v4
        with:
          languages: rust

      - name: Autobuild
        uses: github/codeql-action/autobuild@8c6e48dbe051ceb3015c19554831af1b43275f46 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8c6e48dbe051ceb3015c19554831af1b43275f46 # v4
        with:
          category: "/language:rust"

[advisories]
db-path = "$CARGO_HOME/advisory-db"

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC", "Zlib", "MPL-2.0", "0BSD", "CC0-1.0", "Unicode-3.0", "BSL-1.0", "Unlicense"]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/KooshaPari/clap-ext"]
